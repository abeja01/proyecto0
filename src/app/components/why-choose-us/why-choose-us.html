<section id="why-choose-us" class="why-us">
  <div class="container">
    <div class="why-inner">
      <div class="why-content">
        <small class="heading" style="color: var(--accent-color); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">Excellence Guaranteed</small>
        <h2>Why Discerning Homeowners Choose Bespoke Home Builders</h2>
        
        <ul class="why-list">
          @for (item of list; track item.id) {
            <li>
              <mat-icon class="li-icon">check_circle</mat-icon>
              {{ item.text }}
            </li>
          }
        </ul>
        
        <button mat-flat-button color="primary" class="btn-dark-mat">
          Learn More <mat-icon style="margin-left: 8px;">arrow_forward</mat-icon>
        </button>
      </div>
      
      <div class="why-image">
        <img src="/modern_forest_house_1774275743816.png" alt="Why Choose Us" style="border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.1); width: 100%;">
      </div>
    </div>
  </div>
</section>
